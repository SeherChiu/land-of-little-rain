<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苦雨之地</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS — 已优化为清新、明亮温暖的绿色磨砂模糊
───────────────────────────────────────── */
:root {
  --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
  --font-sans:  'Noto Sans SC', 'PingFang SC', sans-serif;

  /* Fresh, bright and warm green palette */
  --bg-deep:    #2A4430;   /* 清新温暖的林间底色 */
  --bg-mid:     #34543C;   
  --ink:        #15261A;   
  --ink-soft:   #233C29;

  /* Greens with vibrant variation */
  --g-dark:     #3B6344;
  --g-mid:      #4E8259;
  --g-sage:     #6E9E74;
  --g-light:    #97C49D;
  --g-pale:     #BFE3C4;
  --g-mist:     #DBF2DF;
  --g-ghost:    #EDF7EE;

  /* Frosted card surfaces (Bright, warm & blurry) */
  --glass-bg:       rgba(240, 250, 242, 0.16); /* 通透的磨砂白绿 */
  --glass-bg-warm:  rgba(245, 250, 238, 0.22); /* 温暖的微黄绿磨砂 */
  --glass-bg-light: rgba(255, 255, 255, 0.28); 
  --glass-border:   rgba(255, 255, 255, 0.35); /* 明亮的玻璃边缘 */
  --glass-border-h: rgba(255, 255, 255, 0.60); 
  --glass-shine:    rgba(255, 255, 255, 0.20); 

  /* Text on bright glass */
  --t-primary:  #FFFFFF;
  --t-second:   #E2F3E5;
  --t-muted:    #B6D8BD;
  --t-ghost:    #9BC5A3;

  /* Warm Accents */
  --acc-gold:   #F3D598;   /* 温暖的阳光金 */
  --acc-gold-l: rgba(243, 213, 152, 0.3);
  --acc-rust:   rgba(214, 140, 116, 0.6);
  --acc-water:  rgba(132, 201, 190, 0.6);

  --r-card: 14px;
  --r-sm:   8px;
}

/* ─────────────────────────────────────────
   RESET + BASE
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  font-family: var(--font-serif);
  background: var(--bg-deep);
  color: var(--t-primary);
  min-height: 100vh;
  overflow-x: hidden;
  font-weight: 300;
  letter-spacing: 0.03em;
  line-height: 1.7;
}
button { cursor: pointer; font-family: inherit; }
textarea, input { font-family: inherit; }
::selection { background: rgba(255, 255, 255, 0.3); color: var(--t-primary); }

/* ─────────────────────────────────────────
   BACKGROUND — Bright forest canvas
───────────────────────────────────────── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: var(--bg-deep);
  overflow: hidden;
}
.bg-canvas svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ─────────────────────────────────────────
   LAYOUT WRAPPER
───────────────────────────────────────── */
.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 36px;
  border-bottom: 0.5px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(42, 68, 48, 0.45);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-brand-name {
  font-size: 15px;
  font-weight: 400;
  color: var(--t-primary);
  letter-spacing: 0.12em;
}
.nav-brand-sub {
  font-size: 10px;
  color: var(--t-muted);
  letter-spacing: 0.14em;
  font-family: var(--font-sans);
}
.nav-links {
  display: flex;
  gap: 4px;
  align-items: center;
}
.nav-link {
  background: none;
  border: none;
  color: var(--t-second);
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 0.06em;
  transition: background 0.2s, color 0.2s;
}
.nav-link:hover { background: rgba(255, 255, 255, 0.15); color: var(--t-primary); }
.nav-link.active { background: rgba(255, 255, 255, 0.25); color: var(--g-ghost); }
.nav-right {
  display: flex;
  align-items: center;
  gap: 14px;
}
.nav-date {
  font-size: 11px;
  color: var(--t-muted);
  letter-spacing: 0.1em;
  font-family: var(--font-sans);
}
.nav-add {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 0.5px solid var(--glass-border-h);
  background: var(--glass-bg-light);
  color: var(--t-primary);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.nav-add:hover { background: rgba(255, 255, 255, 0.4); }

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero {
  padding: 52px 36px 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.hero-eyebrow {
  font-size: 10px;
  color: var(--t-muted);
  letter-spacing: 0.2em;
  font-family: var(--font-sans);
  text-transform: uppercase;
}
.hero-title {
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 300;
  color: var(--t-primary);
  letter-spacing: 0.06em;
  line-height: 1.45;
}
.hero-title em {
  font-style: normal;
  color: var(--acc-gold);
}
.hero-body {
  font-size: 12px;
  color: var(--t-second);
  max-width: 480px;
  line-height: 1.9;
  letter-spacing: 0.05em;
  font-family: var(--font-sans);
  font-weight: 300;
}

/* MOOD PICKER */
.mood-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.mood-label-text {
  font-size: 10px;
  color: var(--t-muted);
  letter-spacing: 0.1em;
  margin-right: 4px;
}
.mood-chip {
  padding: 4px 13px;
  border-radius: 20px;
  border: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  color: var(--t-second);
  font-size: 11px;
  letter-spacing: 0.04em;
  transition: all 0.18s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.mood-chip:hover { border-color: var(--glass-border-h); background: rgba(255,255,255,0.25); color: var(--t-primary); }
.mood-chip.on {
  background: rgba(255, 255, 255, 0.35);
  border-color: #FFFFFF;
  color: var(--ink);
  font-weight: 400;
}

/* ─────────────────────────────────────────
   MAIN GRID
───────────────────────────────────────── */
.main-grid {
  padding: 0 36px 60px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 14px;
}
.c4  { grid-column: span 4; }
.c5  { grid-column: span 5; }
.c6  { grid-column: span 6; }
.c7  { grid-column: span 7; }
.c8  { grid-column: span 8; }
.c12 { grid-column: span 12; }
.r2  { grid-row: span 2; }

/* ─────────────────────────────────────────
   GLASS CARD BASE
───────────────────────────────────────── */
.card {
  background: var(--glass-bg);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--r-card);
  padding: 18px 20px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--r-card);
  background: linear-gradient(135deg, var(--glass-shine) 0%, transparent 60%);
  pointer-events: none;
}
.card:hover { border-color: var(--glass-border-h); background: rgba(255,255,255,0.20); }

.card-light { background: rgba(255, 255, 255, 0.25); }
.card-dark  { background: rgba(30, 50, 35, 0.35); }
.card-warm  { background: var(--glass-bg-warm); }

/* CARD LABELS & TITLES */
.card-label {
  font-size: 10px;
  color: var(--g-mist);
  letter-spacing: 0.14em;
  margin-bottom: 10px;
  display: flex;
  align
